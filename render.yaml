services:
  - type: web
    name: vitasense-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://vitasense-web.onrender.com

  - type: web
    name: vitasense-web
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://vitasense-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
